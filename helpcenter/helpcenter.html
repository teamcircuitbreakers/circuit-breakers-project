<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Center - Circuit Breakers</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FCF9F2', 100: '#F5EBD0', 200: '#F3ECDF' },
                        brand: { orange: '#F97316', orangedark: '#EA580C' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5EBD0; color: #1F2937; height: 100vh; overflow: hidden; display: flex; flex-direction: column;}
        
        .chat-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            /* Soft rounded corners on desktop, full bleed on mobile */
            @media (min-width: 768px) { border-radius: 1.5rem; margin-top: 2rem; margin-bottom: 2rem; height: calc(100vh - 4rem); }
        }

        .chat-header {
            background: linear-gradient(135deg, #F97316, #EA580C);
            color: white;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top-left-radius: inherit;
            border-top-right-radius: inherit;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: #FCF9F2;
            scrollbar-width: thin;
            scrollbar-color: #F97316 #F5EBD0;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: #F5EBD0; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: #F97316; border-radius: 10px; }

        .msg-bubble {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 1.25rem;
            font-size: 1.05rem;
            line-height: 1.6;
            word-wrap: break-word;
            opacity: 0;
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .msg-bot { background: white; align-self: flex-start; border-bottom-left-radius: 0.25rem; border: 1px solid #F3ECDF; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .msg-user { background: #EA580C; color: white; align-self: flex-end; border-bottom-right-radius: 0.25rem; box-shadow: 0 4px 6px rgba(234, 88, 12, 0.2); }
        
        /* Markdown Styling inside Bubbles */
        .msg-bot p { margin-bottom: 0.75rem; }
        .msg-bot p:last-child { margin-bottom: 0; }
        .msg-bot ul, .msg-bot ol { margin-left: 1.5rem; margin-bottom: 0.75rem; list-style-type: disc; }
        .msg-bot li { margin-bottom: 0.25rem; }
        .msg-bot strong { font-weight: 700; color: #9a3412; }
        .msg-bot a { color: #ea580c; font-weight: bold; text-decoration: underline; transition: color 0.2s; }
        .msg-bot a:hover { color: #c2410c; }

        .quick-actions {
            padding: 1rem 2rem;
            background: #FCF9F2;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            transition: all 0.3s ease;
        }
        .quick-actions.hidden { display: none; }
        .action-pill {
            background: white; border: 1px solid #F97316; color: #EA580C; padding: 0.5rem 1rem; border-radius: 99px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(249, 115, 22, 0.1);
        }
        .action-pill:hover { background: #F97316; color: white; transform: translateY(-2px); }

        .chat-input-area {
            padding: 1.5rem;
            background: white;
            border-top: 1px solid #F3ECDF;
            display: flex;
            gap: 1rem;
            border-bottom-left-radius: inherit;
            border-bottom-right-radius: inherit;
        }
        .chat-input { flex-grow: 1; padding: 1rem 1.5rem; border: 2px solid #F3ECDF; border-radius: 99px; outline: none; font-size: 1.05rem; background: #FCF9F2; transition: all 0.3s ease; }
        .chat-input:focus { border-color: #F97316; background: white; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); }
        .chat-send-btn { background: #F97316; color: white; border: none; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.3); }
        .chat-send-btn:hover { background: #EA580C; transform: scale(1.05); }
        .chat-send-btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: scale(1); box-shadow: none;}

        .typing-indicator { display: flex; gap: 6px; padding: 8px 12px; align-items: center; }
        .typing-dot { width: 8px; height: 8px; background: #EA580C; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; opacity: 0.7;}
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Cursor for the typing effect */
        .typing-cursor::after {
            content: '▌';
            animation: blink 1s step-start infinite;
            color: #EA580C;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="chat-container">
        
        <!-- Header -->
        <div class="chat-header">
            <div class="flex items-center">
                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center mr-4 shadow-md">
                    <svg class="w-7 h-7 text-orange-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-wide">Circuit Breakers Support</h1>
                    <p class="text-sm text-orange-100 font-medium">Powered by AI Assistant</p>
                </div>
            </div>
            <a href="/" class="flex items-center text-white hover:text-orange-200 transition-colors font-semibold text-sm">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Website
            </a>
        </div>

        <!-- Chat Area -->
        <div class="chat-messages" id="chat-messages">
            <div class="msg-bubble msg-bot">
                <p>Hi there! 👋 Welcome to the Circuit Breakers Help Center.</p>
                <p>I can help you with questions about our DIY kits, custom projects, pricing, shipping, or our 5-pillar ecosystem.</p>
            </div>
        </div>

        <!-- Quick Actions (Suggested Questions) -->
        <div class="quick-actions" id="quick-actions">
            <button class="action-pill" onclick="sendQuickAction('How do custom projects work?')">How do custom projects work?</button>
            <button class="action-pill" onclick="sendQuickAction('What is the difference between DIY and Assembled?')">DIY vs Assembled?</button>
            <button class="action-pill" onclick="sendQuickAction('What is your shipping policy?')">Shipping Policy?</button>
            <button class="action-pill" onclick="sendQuickAction('I need to talk to a human.')">Talk to a human 💬</button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Type your question here..." autocomplete="off">
            <button id="chat-send" class="chat-send-btn" aria-label="Send Message">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const chatSendBtn = document.getElementById('chat-send');
            const quickActionsContainer = document.getElementById('quick-actions');

            // ==========================================
            // API KEY INJECTED FOR TESTING
            // ==========================================
            const GEMINI_API_KEY = 'AIzaSyBEHdrVO9bC8FSs262pw7PmzyjFxgJty9w'; 

            // RAG Context + SMART ESCALATION RULE
            const SYSTEM_INSTRUCTION = `
            You are the official Customer Support AI for "Circuit Breakers" (teamcircuitbreakers.in).
            Your tone should be highly helpful, professional, enthusiastic, and encouraging.
            
            IMPORTANT ESCALATION RULE:
            If the user explicitly asks to speak to a human, seems frustrated, complains about an order, or asks for a highly complex custom project that requires an engineer's review, you MUST stop trying to solve the problem and instead provide this EXACT response:
            "It sounds like you need our engineering or support team! Please click here to chat with us directly on WhatsApp: [Chat with a Human on WhatsApp](https://wa.me/919062420056?text=Hi,%20I%20need%20human%20assistance%20from%20the%20Help%20Center). Our team will take over immediately."

            KNOWLEDGE BASE:
            COMPANY INFO:
            Name: Circuit Breakers
            Mission: A student-led initiative in India dismantling barriers to electronics/IoT innovation. We help aspiring engineers and hobbyists by providing affordable education, accessible hardware, mentorship, and a path to commercialization.
            Location: Kolkata, West Bengal (PIN-700119)
            Email: devteam.circuitbreakers@gmail.com
            Phones: +91-8910652873, +91-9062420056

            THE 5-PILLAR ECOSYSTEM:
            1. Student Section: Affordable learning paths (Est. ₹500/month) for coding, embedded systems, IoT.
            2. Teacher Section: Experienced mentors sharing expertise.
            3. Tech Library: Hardware-as-a-Service (Est. ₹100/month). Borrow physical components like books.
            4. Dev Section: R&D heart for branded products and community prototypes.
            5. Main Store: E-commerce platform.

            PROJECT SERVICES:
            - "Ready-to-Use Projects": Pre-built kits.
            - "Customize by Budget" (Most Popular): Tell us a budget and basic need, we design it.
            - "Turn Your Idea Into Reality": Share a sketch/idea, we build it.

            DELIVERY OPTIONS:
            - DIY (Do It Yourself): Includes all raw components, free PDF manual, free setup guide. No assembling charge. Delivery extra.
            - Ready-to-Use Assembled: Fully assembled, tested, ready to use out of the box. Includes free PDF manual. Assembling charge is exactly ₹69. Delivery extra.

            POLICIES:
            - Payment: 100% advance payment required. DO NOT make payments before a confirmation call from our team.
            - Shipping: 4-5 days processing + 3-7 days delivery.
            - Refunds: Advance payments are non-refundable once work begins. For DOA items, email within 48 hours.
            `;

            let chatHistory = [];

            // Adds an immediate static bubble (used for user messages)
            function appendStaticMessage(text, isBot = false) {
                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${isBot ? 'msg-bot' : 'msg-user'}`;
                bubble.innerHTML = isBot && typeof marked !== 'undefined' ? marked.parse(text) : text;
                chatMessages.appendChild(bubble);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Real-life Character-by-Character Typewriter Effect handling Markdown HTML safely
            async function typeWriterEffect(htmlText) {
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble msg-bot typing-cursor';
                chatMessages.appendChild(bubble);
                
                let i = 0;
                let isTag = false;
                let currentHTML = '';

                // Render the character by character
                while (i < htmlText.length) {
                    if (htmlText.charAt(i) === '<') isTag = true;
                    
                    currentHTML += htmlText.charAt(i);
                    
                    if (htmlText.charAt(i) === '>') isTag = false;
                    
                    bubble.innerHTML = currentHTML;
                    
                    // Only pause if we are typing actual text, not parsing HTML tags
                    if (!isTag) {
                        // Randomize typing speed slightly for realism (10ms to 30ms)
                        const speed = Math.floor(Math.random() * 20) + 10;
                        await new Promise(r => setTimeout(r, speed));
                    }
                    
                    i++;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
                
                // Remove cursor class when done
                bubble.classList.remove('typing-cursor');
            }

            function showTypingIndicator() {
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble msg-bot';
                bubble.id = 'typing-indicator';
                bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
                chatMessages.appendChild(bubble);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeTypingIndicator() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) indicator.remove();
            }

            // Exported to window so quick action buttons can call it
            window.sendQuickAction = function(text) {
                chatInput.value = text;
                sendMessage();
            }

            async function sendMessage() {
                const text = chatInput.value.trim();
                if (!text) return;

                // Hide quick actions after first message
                quickActionsContainer.classList.add('hidden');

                chatInput.value = '';
                chatInput.disabled = true;
                chatSendBtn.disabled = true;
                
                appendStaticMessage(text, false);
                showTypingIndicator();

                chatHistory.push({ role: "user", parts: [{ text: text }] });

                const payload = {
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: chatHistory
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(`API Error ${response.status}: ${errorData.error?.message || 'Unknown'}`);
                    }

                    const data = await response.json();
                    const rawBotText = data.candidates[0].content.parts[0].text;
                    
                    // Parse markdown to HTML
                    const htmlBotText = marked.parse(rawBotText);

                    removeTypingIndicator();
                    
                    // Start the real-life typing effect
                    await typeWriterEffect(htmlBotText);

                    chatHistory.push({ role: "model", parts: [{ text: rawBotText }] });

                } catch (error) {
                    removeTypingIndicator();
                    console.error('Fetch error:', error);
                    appendStaticMessage(`⚠️ **System Alert:** We're having trouble connecting to the AI. Please [click here to chat with us on WhatsApp](https://wa.me/919062420056) instead!`, true);
                    chatHistory.pop(); 
                } finally {
                    chatInput.disabled = false;
                    chatSendBtn.disabled = false;
                    chatInput.focus();
                }
            }

            chatSendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            
            // Auto focus input on load
            chatInput.focus();
        });
    </script>
</body>
</html>
