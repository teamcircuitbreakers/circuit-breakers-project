<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surepass DigiLocker eKYC Sandbox</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --primary: #10b981;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }
  
  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  h2 { margin-top: 0; font-size: 1.5rem; }
  p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  
  button {
    width: 100%; padding: 14px; background: var(--primary); color: #022c22;
    border: none; border-radius: 8px; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
  }
  
  button:disabled { background: #334155; color: #94a3b8; cursor: wait; }

  #link-container, #data-container, #loading-container {
    display: none;
    margin-top: 20px;
    padding: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    text-align: left;
  }

  a.digilocker-btn {
    display: block;
    margin-top: 16px;
    padding: 12px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    text-align: center;
  }
  
  pre {
    background: #000;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 0.8rem;
    color: #34d399;
    text-align: left;
  }
</style>
</head>
<body>

<div class="glass-card">
  <h2>DigiLocker KYC Onboarding</h2>
  <p id="main-desc">Initialize a secure DigiLocker session via Surepass.</p>
  
  <button id="init-btn" onclick="initializeDigiLocker()">Initialize Session</button>

  <!-- Step 1: The Link -->
  <div id="link-container">
    <p style="color: var(--primary); margin-bottom: 12px; font-weight: bold; text-align: center;">Session Created!</p>
    <a href="#" id="digilocker-link" class="digilocker-btn">Open DigiLocker Portal</a>
  </div>

  <!-- Step 2: Fetching Data State -->
  <div id="loading-container">
    <p style="text-align: center; color: var(--primary);">User returned! Fetching KYC data from Surepass...</p>
  </div>

  <!-- Step 3: The Result Data -->
  <div id="data-container">
    <h3 style="color: var(--primary); margin-top: 0;">KYC Data Retrieved ✓</h3>
    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Here is the raw output from DigiLocker:</p>
    <pre id="json-output"></pre>
    <button onclick="window.location.href = window.location.pathname" style="margin-top: 16px;">Start New Session</button>
  </div>
</div>

<script>
  const WORKER_URL = "https://soft-lab-fea9.devteam-circuitbreakers.workers.dev";

  // Check URL on page load to see if we just returned from DigiLocker
  window.onload = async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const returningClientId = urlParams.get('client_id');

    if (returningClientId) {
      // We are returning from the DigiLocker flow!
      document.getElementById('init-btn').style.display = 'none';
      document.getElementById('main-desc').style.display = 'none';
      document.getElementById('loading-container').style.display = 'block';
      
      await fetchFinalCustomerData(returningClientId);
    }
  };

  async function initializeDigiLocker() {
    const btn = document.getElementById('init-btn');
    btn.disabled = true;
    btn.innerText = "Initializing securely...";

    const payload = {
      "data": {
        "expiry_minutes": 10,
        "send_sms": false,
        "send_email": false,
        "verify_phone": false,
        "verify_email": false,
        "redirect_url": window.location.href, // User comes back here
        "skip_main_screen": false,
        "signup_flow": false
      }
    };

    try {
      const res = await fetch(`${WORKER_URL}/api/v1/digilocker/initialize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      const responseData = await res.json();
      
      if (responseData.success && responseData.data) {
        document.getElementById('link-container').style.display = 'block';
        document.getElementById('digilocker-link').href = responseData.data.url;
        btn.style.display = 'none';
      } else {
        alert("API Error: " + JSON.stringify(responseData));
        btn.disabled = false;
        btn.innerText = "Try Again";
      }
    } catch (e) {
      alert("Connection error.");
      btn.disabled = false;
    }
  }

  // New Function: Fetch the actual data using the Client ID via a GET request
  async function fetchFinalCustomerData(clientId) {
    try {
      // 1. Build the exact endpoint path shown in your screenshot
      const dataEndpoint = `/api/v1/digilocker/download-aadhaar/${clientId}`; 
      
      // 2. Make a GET request to your Cloudflare Worker proxy
      const res = await fetch(`${WORKER_URL}${dataEndpoint}`, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });

      // 3. Catch HTML errors gracefully in case of 404s or invalid paths
      const contentType = res.headers.get("content-type");
      if (contentType && contentType.indexOf("text/html") !== -1) {
          const htmlText = await res.text();
          console.error("Received HTML error:", htmlText);
          throw new Error("Server returned an HTML page. Double-check your API permissions.");
      }

      const data = await res.json();
      
      // 4. Update the UI
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('data-container').style.display = 'block';
      
      // 5. Display the JSON Output
      document.getElementById('json-output').innerText = JSON.stringify(data, null, 2);

    } catch (e) {
      document.getElementById('loading-container').style.display = 'none';
      alert(e.message);
      console.error(e);
    }
  }
</script>
</body>
</html>
