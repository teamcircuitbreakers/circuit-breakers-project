<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surepass DigiLocker eKYC Sandbox</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --primary: #10b981;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }
  
  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 450px;
    text-align: center;
  }

  h2 { margin-top: 0; font-size: 1.5rem; }
  p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  
  button {
    width: 100%; padding: 14px; background: var(--primary); color: #022c22;
    border: none; border-radius: 8px; font-weight: 600; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
  }
  
  button:disabled { background: #334155; color: #94a3b8; cursor: wait; }

  #link-container {
    display: none;
    margin-top: 20px;
    padding: 16px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border: 1px solid var(--glass-border);
  }

  a.digilocker-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 10px 20px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="glass-card">
  <h2>DigiLocker KYC Onboarding</h2>
  <p>Click below to initialize the secure DigiLocker session via Surepass.</p>
  
  <button id="init-btn" onclick="initializeDigiLocker()">Initialize Session</button>

  <div id="link-container">
    <p style="color: var(--primary); margin-bottom: 8px;">Session Created Successfully!</p>
    <p style="font-size: 0.85rem;">Client ID: <span id="display-client-id" style="color: white;"></span></p>
    <!-- This button will take them to the Surepass UI -->
    <a href="#" id="digilocker-link" class="digilocker-btn" target="_blank">Open DigiLocker Portal</a>
  </div>
</div>

<script>
  // Your live Cloudflare Worker URL
  const WORKER_URL = "https://soft-lab-fea9.devteam-circuitbreakers.workers.dev";

  async function initializeDigiLocker() {
    const btn = document.getElementById('init-btn');
    btn.disabled = true;
    btn.innerText = "Initializing...";

    // This is the configuration payload you provided
    const payload = {
      "expiry_minutes": 10,
      "send_sms": false,
      "send_email": false,
      "verify_phone": false,
      "verify_email": false,
      "redirect_url": window.location.href, // Redirects back to this page when done
      "skip_main_screen": false,
      "signup_flow": false
    };

    try {
      // Hit the initialize endpoint via your secure worker proxy
      const res = await fetch(`${WORKER_URL}/api/v1/digilocker/initialize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      const responseData = await res.json();
      
      if (responseData.success || responseData.data) {
        // Show the link generated by Surepass
        document.getElementById('link-container').style.display = 'block';
        
        // Surepass usually returns the link in data.url or data.authorization_url
        const redirectLink = responseData.data.url || responseData.data.authorization_url;
        document.getElementById('digilocker-link').href = redirectLink;
        
        document.getElementById('display-client-id').innerText = responseData.data.client_id;
        btn.style.display = 'none';
      } else {
        alert("Failed to initialize: " + JSON.stringify(responseData));
        btn.disabled = false;
        btn.innerText = "Try Again";
      }
    } catch (e) {
      console.error(e);
      alert("Connection error. Check console.");
      btn.disabled = false;
      btn.innerText = "Initialize Session";
    }
  }
</script>
</body>
</html>
