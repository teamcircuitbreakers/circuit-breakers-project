<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surepass eKYC Integration</title>
<style>
  :root {
    --bg-dark: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --primary: #10b981;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
  }
  
  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
  }

  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  }

  .step { display: none; animation: fadeIn 0.4s ease; }
  .step.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  h2 { margin-top: 0; font-size: 1.5rem; }
  p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
  label { display: block; font-size: 0.85rem; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; }
  
  input {
    width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.8);
    border: 1px solid var(--glass-border); border-radius: 8px; color: white;
    font-size: 1rem; margin-bottom: 20px; box-sizing: border-box;
  }
  input:focus { outline: none; border-color: var(--primary); }

  button {
    width: 100%; padding: 14px; background: var(--primary); color: #022c22;
    border: none; border-radius: 8px; font-weight: 600; font-size: 1rem;
    cursor: pointer; display: flex; justify-content: center; align-items: center; min-height: 48px;
  }
  button:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }

  .loader {
    display: none; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #022c22;
    border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  .success-data { background: rgba(0,0,0,0.25); padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid var(--glass-border); }
  .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.95rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
  .data-row:last-child { border: none; }
  .data-label { color: var(--text-muted); }
  .data-value { font-weight: 500; }
  .reset-btn { margin-top: 24px; background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); }
</style>
</head>
<body>

<div class="glass-card">
  <!-- Step 1: ID Entry -->
  <div id="step-1" class="step active">
    <h2>Aadhaar Verification</h2>
    <p>Enter your Aadhaar number to begin eKYC.</p>
    <label>Aadhaar Number</label>
    <input type="text" id="aadhaar-input" placeholder="Enter 12-digit Aadhaar" maxlength="12">
    <button id="btn-generate" onclick="generateOTP()">
      <span id="text-generate">Get OTP</span>
      <div id="loader-generate" class="loader"></div>
    </button>
  </div>

  <!-- Step 2: OTP Verification -->
  <div id="step-2" class="step">
    <h2>Verify OTP</h2>
    <p>Enter the 6-digit OTP sent to your registered mobile.</p>
    <label>One Time Password</label>
    <input type="text" id="otp-input" placeholder="123456" maxlength="6">
    <button id="btn-verify" onclick="verifyOTP()">
      <span id="text-verify">Submit</span>
      <div id="loader-verify" class="loader"></div>
    </button>
  </div>

  <!-- Step 3: Success Data Output -->
  <div id="step-3" class="step">
    <h2 style="color: var(--primary);">KYC Verified ✓</h2>
    <div class="success-data">
      <div class="data-row"><span class="data-label">Name</span><span class="data-value" id="res-name">-</span></div>
      <div class="data-row"><span class="data-label">Gender</span><span class="data-value" id="res-gender">-</span></div>
      <div class="data-row"><span class="data-label">DOB</span><span class="data-value" id="res-dob">-</span></div>
    </div>
    <button class="reset-btn" onclick="resetDemo()">Start Over</button>
  </div>
</div>

<script>
  // REPLACE THIS WITH YOUR CLOUDFLARE WORKER URL
  const WORKER_URL = "https://soft-lab-fea9.devteam-circuitbreakers.workers.dev";
  let currentClientId = "";

  async function generateOTP() {
    const aadhaar = document.getElementById('aadhaar-input').value;
    if(aadhaar.length !== 12) { alert("Enter valid Aadhaar"); return; }
    
    toggleUI('btn-generate', 'text-generate', 'loader-generate', true);
    
    try {
      // The worker appends the specific Surepass endpoint path
      const res = await fetch(`${WORKER_URL}/api/v1/aadhaar-v2/generate-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_number: aadhaar })
      });
      const data = await res.json();
      
      if (data.success) {
        currentClientId = data.data.client_id;
        showStep('step-2');
      } else {
        alert(data.message || "Failed to generate OTP");
      }
    } catch (e) {
      alert("Connection error");
    } finally {
      toggleUI('btn-generate', 'text-generate', 'loader-generate', false);
    }
  }

  async function verifyOTP() {
    const otp = document.getElementById('otp-input').value;
    if(otp.length !== 6) { alert("Enter valid OTP"); return; }
    
    toggleUI('btn-verify', 'text-verify', 'loader-verify', true);
    
    try {
      const res = await fetch(`${WORKER_URL}/api/v1/aadhaar-v2/submit-otp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ client_id: currentClientId, otp: otp })
      });
      const data = await res.json();
      
      if (data.success) {
        document.getElementById('res-name').innerText = data.data.full_name || "-";
        document.getElementById('res-gender').innerText = data.data.gender || "-";
        document.getElementById('res-dob').innerText = data.data.dob || "-";
        showStep('step-3');
      } else {
        alert(data.message || "Invalid OTP");
      }
    } catch (e) {
      alert("Connection error");
    } finally {
      toggleUI('btn-verify', 'text-verify', 'loader-verify', false);
    }
  }

  function showStep(id) {
    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function toggleUI(btnId, textId, loaderId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    document.getElementById(textId).style.display = loading ? 'none' : 'block';
    document.getElementById(loaderId).style.display = loading ? 'block' : 'none';
  }

  function resetDemo() {
    document.getElementById('aadhaar-input').value = '';
    document.getElementById('otp-input').value = '';
    showStep('step-1');
  }
</script>
</body>
</html>
